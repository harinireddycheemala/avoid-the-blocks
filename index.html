<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avoid the Blocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="arcade">

    <!-- CRT scanline / vignette overlay -->
    <div id="crt-overlay"></div>
    <div id="shake-wrap">

      <!-- HUD -->
      <div id="hud">
        <div class="hud-block">
          <span class="hud-label">SCORE</span>
          <span id="score" class="hud-value">0</span>
        </div>
        <div class="hud-block hud-right">
          <span class="hud-label">HIGH SCORE</span>
          <span id="high-score" class="hud-value">0</span>
        </div>
      </div>

      <canvas id="game-canvas"></canvas>

      <!-- Start Screen -->
      <div id="start-screen" class="screen">
        <div class="title-wrap">
          <h1 class="glitch-title" data-text="AVOID THE BLOCKS">AVOID THE BLOCKS</h1>
          <p class="subtitle">dodge // survive // beat your best</p>
        </div>
        <button id="play-btn" class="arcade-btn">PLAY</button>
        <div class="controls-hint">
          <span>◄ ► or A / D — move</span>
          <span>P — pause</span>
        </div>
      </div>

      <!-- Countdown -->
      <div id="countdown-screen" class="screen hidden">
        <span id="countdown-number">3</span>
      </div>

      <!-- Pause Screen -->
      <div id="pause-screen" class="screen hidden">
        <h2 class="pause-title">PAUSED</h2>
        <p class="subtitle">press P to resume</p>
      </div>

      <!-- Game Over Screen -->
      <div id="gameover-screen" class="screen hidden">
        <h2 class="gameover-title">💀 GAME OVER</h2>
        <p id="final-score" class="final-score">Score: 0</p>
        <p id="new-best" class="new-best hidden">✨ NEW HIGH SCORE ✨</p>
        <button id="restart-btn" class="arcade-btn">RESTART</button>
        <div class="controls-hint">
          <span>press SPACE to restart</span>
        </div>
      </div>

    </div>

    <div class="mobile-controls">
      <button id="btn-left" class="move-btn">◄ LEFT</button>
      <button id="btn-right" class="move-btn">RIGHT ►</button>
    </div>

  </div>

<script src="script.js"></script>
</body>
</html>
